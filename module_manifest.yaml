    - POST /api/ems/review/{session_id}/approve
    - POST /api/ems/review/{session_id}/reject
    - GET /api/ems/review/{session_id}/comparison
    - GET /api/ems/archetypes/mine
    - PUT /api/ems/archetypes/{id}/visibility
    - GET /api/ems/archetypes/{id}/evolution-check
    - POST /api/ems/archetypes/{id}/evolve

